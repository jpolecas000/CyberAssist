    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #message { margin-top: 20px; font-weight: bold; text-align: center; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

    <h2>Book an Appointment</h2>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="date">Date:</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label for="time">Time:</label>
            <input type="time" id="time" required>
        </div>
        <div class="form-group">
            <label for="package-type">Package:</label>
            <select type="packages" id="options" required>
                <option value="20">20 Minute Appointment</option>
                <option value="40">20 Minute Appointment</option>
                <option value="60">20 Minute Appointment</option>
                <option value="Premium">20 Minute Appointment</option>
                <option value="Unlimited">20 Minute Appointment</option>
        </div>
        <button type="submit" id="submitBtn">Check Availability & Book</button>
    </form>

    <div id="message"></div>

</body>
</html>
