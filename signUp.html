<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Sign Up Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2>Create Account</h2>
        <p>Join us by creating a new account</p>

        <form id="signupForm">
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password">
                <span class="error-message" id="passwordError"></span>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password">
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <button type="submit" id="signupBtn">Sign Up</button>
            
            <p class="success-message" id="successMessage"></p>
            
            <p class="redirect-text">Already have an account? <a href="index.html">Log in</a></p>
        </form>
    </div>

    <script src="signup.js"></script>
</body>
</html>
